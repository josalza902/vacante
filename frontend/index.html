<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vacante - Empleos en Latinoamérica</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <!-- BARRA DE NAVEGACIÓN -->
  <nav>
    <div class="nav-logo">Vacante</div>
    <div class="nav-links">
      <a href="#">Buscar empleo</a>
      <a href="#">Publicar vacante</a>
      <a href="#">Registrarse</a>
      <a href="#" class="btn-login">Iniciar sesión</a>
    </div>
  </nav>

  <!-- HERO: sección principal -->
  <section class="hero">
    <h1>Encuentra tu próximo empleo en Latinoamérica</h1>
    <p>Conectamos profesionales, equipos y empresas en toda la región</p>
    <div class="search-bar">
      <input type="text" placeholder="¿Qué trabajo buscas?">
      <input type="text" placeholder="País o ciudad">
      <button>Buscar</button>
    </div>
  </section>

  <!-- CATEGORÍAS -->
  <section class="categorias">
    <h2>Explora por categoría</h2>
    <div class="categorias-grid">
      <div class="categoria-card">💻 Tecnología</div>
      <div class="categoria-card">🏥 Salud</div>
      <div class="categoria-card">🏗️ Construcción</div>
      <div class="categoria-card">📚 Educación</div>
      <div class="categoria-card">🎨 Diseño</div>
      <div class="categoria-card">📦 Logística</div>
      <div class="categoria-card">💼 Administración</div>
      <div class="categoria-card">⚖️ Legal</div>
    </div>
  </section>

  <script src="js/main.js"></script>
</body>
</html>
